<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacultySync - M.Kumarasamy College of Engineering</title>
    <link rel="stylesheet" href="css/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --college-blue: #004a89;
            --college-accent: #c52128;
            --aura-primary: #0056b3;
            --aura-secondary: #c52128;
            --text-main: #1e293b;
            --text-light: #64748b;
            --text-muted: #64748b;
            --bg-aura: #ffffff;
            --glass-border: rgba(0, 74, 137, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .aura-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: -1;
            overflow: hidden;
        }

        .aura-1 {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50%;
            height: 60%;
            background: radial-gradient(circle, rgba(0, 74, 137, 0.08) 0%, transparent 70%);
            filter: blur(60px);
            animation: auraMove 15s ease-in-out infinite alternate;
        }

        .aura-2 {
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 40%;
            height: 50%;
            background: radial-gradient(circle, rgba(197, 33, 40, 0.05) 0%, transparent 70%);
            filter: blur(60px);
            animation: auraMove 20s ease-in-out infinite alternate-reverse;
        }

        @keyframes auraMove {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(5%, 5%) scale(1.1);
            }
        }

        /* Official Institutional Header - Premium Refinement */
        .college-header {
            background: #ffffff;
            width: 100%;
            display: flex;
            justify-content: center;
            border-bottom: 4px solid var(--college-blue);
            box-shadow: 0 10px 30px -10px rgba(0, 74, 137, 0.1);
            position: relative;
            z-index: 1000;
        }

        .header-max-width {
            max-width: 1400px;
            width: 100%;
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .college-logo-official {
            height: 100px;
            width: auto;
            display: block;
            filter: none;
        }

        /* Branding Nav */
        .nav-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: absolute;
            top: 0;
            right: 0;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: var(--college-blue);
        }

        /* Hero Section Upgrade - High Professionalism */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2.5rem;
            gap: 6rem;
        }

        .hero-layout {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 10rem;
            align-items: start;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .hero-layout {
                grid-template-columns: 1fr;
                gap: 3rem;
                text-align: center;
            }

            .hero-text {
                margin: 0 auto;
            }

            .login-card {
                margin: 0 auto;
            }
        }

        .hero-text {
            max-width: 650px;
        }



        .hero-title {
            font-family: 'Sora', sans-serif;
            font-size: 5.5rem;
            font-weight: 800;
            line-height: 0.95;
            margin-bottom: 2rem;
            color: var(--text-main);
            letter-spacing: -0.05em;
            animation: heroFadeIn 0.8s ease-out forwards;
        }

        .hero-title span {
            background: linear-gradient(135deg, var(--college-blue) 0%, var(--aura-secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            margin-top: 0.75rem;
        }

        .hero-desc {
            color: var(--text-light);
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 3rem;
            max-width: 580px;
            font-weight: 500;
            animation: heroFadeIn 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        .hero-image-wrapper {
            animation: heroFadeIn 1.2s ease-out 0.4s forwards;
            opacity: 0;
            width: 100%;
            max-width: 500px;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px -10px rgba(0, 74, 137, 0.15);
        }

        @keyframes heroFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }



        /* Surgical Minimalist Login Card */
        .login-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            padding: 4rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 480px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card:hover {
            border-color: #cbd5e1;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .minimal-header {
            margin-bottom: 3rem;
        }

        .minimal-header h2 {
            font-family: 'Sora', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .minimal-header p {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.75rem;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-box {
            position: relative;
        }

        .input-box i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .form-control {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem 1rem 1rem 3.2rem;
            color: #1e293b;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--college-blue);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 74, 137, 0.05);
        }

        .form-control:focus+i {
            color: var(--college-blue);
        }

        .btn-login {
            width: 100%;
            background: var(--college-blue);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #003a6c;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-error {
            background: #fff1f2;
            color: #be123c;
            padding: 0.85rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid #ffe4e6;
            display: none;
        }

        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
        }

        .footer-note a {
            color: var(--college-blue);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.25rem;
        }

        /* System Status Upgrade */
        .system-status {
            position: fixed;
            bottom: 3rem;
            left: 3rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.5rem;
            background: white;
            border-radius: 100px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            z-index: 1000;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 15px #10b981;
        }

        /* Institutional Logo Loader */
        /* Institutional Logo Loader */
        #pageLoader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .loader-visual-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Unique Orbiting Rings */
        .loader-orbit {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            animation: rotateOrbit linear infinite;
        }

        .orbit-1 {
            width: 180px;
            height: 180px;
            border-top-color: var(--college-blue);
            border-bottom-color: var(--college-blue);
            animation-duration: 3s;
            opacity: 0.3;
        }

        .orbit-2 {
            width: 220px;
            height: 220px;
            border-left-color: var(--college-accent);
            border-right-color: var(--college-accent);
            animation-duration: 2s;
            animation-direction: reverse;
            opacity: 0.2;
        }

        /* Pulsing Aura Ripple */
        .loader-ripple {
            position: absolute;
            width: 100px;
            height: 100px;
            background: var(--college-blue);
            border-radius: 50%;
            opacity: 0.1;
            animation: rippleEffect 2s ease-out infinite;
        }

        .loader-logo-container {
            position: relative;
            z-index: 10;
            background: white;
            padding: 20px;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 74, 137, 0.05);
        }

        .loader-logo {
            height: 60px;
            width: auto;
            display: block;
        }

        /* Rotating Node Points */
        .orbit-node {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--college-blue);
            border-radius: 50%;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px var(--college-blue);
        }

        @keyframes rotateOrbit {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes rippleEffect {
            0% {
                transform: scale(0.8);
                opacity: 0.3;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .loader-text-aura {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
        }

        .loading-dots::after {
            content: '...';
            display: inline-block;
            width: 20px;
            animation: dotsAnim 1.5s steps(4, end) infinite;
        }

        @keyframes dotsAnim {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }

        #pageLoader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>

<body>
    <div id="pageLoader">
        <div class="loader-visual-wrapper">
            <div class="loader-ripple"></div>
            <div class="loader-orbit orbit-1">
                <div class="orbit-node"></div>
            </div>
            <div class="loader-orbit orbit-2"></div>

            <div class="loader-logo-container">
                <div class="loader-center-node"
                    style="width: 12px; height: 12px; background: var(--college-blue); border-radius: 50%; box-shadow: 0 0 20px var(--college-blue);">
                </div>
            </div>

            <div class="loader-text-aura">
                <p
                    style="color: var(--college-blue); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 0.5rem;">
                    Faculty portal</p>
                <span class="loading-dots"
                    style="color: #64748b; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;">Loading
                </span>
            </div>
        </div>
    </div>
    <div class="aura-bg">
        <div class="aura-1"></div>
        <div class="aura-2"></div>
    </div>

    <header class="college-header">
        <div class="header-max-width">
            <img src="download.png" alt="M.Kumarasamy College of Engineering" class="college-logo-official">
        </div>
    </header>

    <nav class="nav-container">
        <div class="nav-links">
            <a href="#" class="nav-link">Staff Support</a>
            <a href="#" class="nav-link">IT Helpdesk</a>
        </div>
    </nav>

    <main class="main-wrapper">
        <div class="hero-layout">
            <div class="hero-text">
                <h1 class="hero-title">
                    Faculty <span>Leave & Substitute</span>
                </h1>
                <p class="hero-desc">
                    Institutional platform for automated resource orchestration. Manage leave requests and peer-matching
                    with university-grade security.
                </p>
                <div class="hero-image-wrapper">

                </div>
            </div>

            <div class="login-card">
                <div class="minimal-header">
                    <h2>
                        <center>Staff Portal</center>
                    </h2>

                </div>

                <div id="loginError" class="login-error">
                    The ID or password you entered is incorrect.
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Faculty ID</label>
                        <div class="input-box">
                            <i class="fas fa-id-badge"></i>
                            <input type="text" id="username" class="form-control" placeholder="Institutional ID"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-box">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div style="display: flex; align-items: center; gap: 0.5rem; margin: 1.5rem 0 2rem;">
                        <input type="checkbox" id="rememberMe" style="accent-color: #0f172a; cursor: pointer;">
                        <label for="rememberMe"
                            style="font-size: 0.85rem; color: #64748b; cursor: pointer; font-weight: 500;">Stay logged
                            in</label>
                    </div>

                    <button type="submit" class="btn-login">Sign In</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/db.js"></script>
    <script src="js/common.js"></script>
    <script>
        // Loader Control
        window.addEventListener('load', () => {
            const loader = document.getElementById('pageLoader');
            setTimeout(() => {
                loader.classList.add('fade-out');
            }, 800);
        });

        document.addEventListener('DOMContentLoaded', () => {
            const savedId = localStorage.getItem('remembered_id');

            if (savedId) {
                document.getElementById('username').value = savedId;
                document.getElementById('rememberMe').checked = true;
            }

            // Show session-expired message if redirected from a 401 response [BUG 3 FIX]
            const loginError = sessionStorage.getItem('login_error');
            if (loginError) {
                const errorEl = document.getElementById('loginError');
                if (errorEl) {
                    errorEl.textContent = loginError;
                    errorEl.style.display = 'block';
                }
                sessionStorage.removeItem('login_error');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const id = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('loginError');
            const loader = document.getElementById('pageLoader');

            errorEl.style.display = 'none';

            // Show authentication loader
            loader.querySelector('p').textContent = "Authenticating Session...";
            loader.classList.remove('fade-out');

            const validatedUser = await db.validateLogin(id, pass);

            if (validatedUser) {
                if (rememberMe) {
                    localStorage.setItem('remembered_id', id);
                } else {
                    localStorage.removeItem('remembered_id');
                }

                // Note: db.login and redirection handled correctly inside validateLogin or here
                if (validatedUser.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                // Failed auth - error reset and display
                loader.classList.add('fade-out');
                errorEl.style.display = 'block';
            }
        }); 
    </script>
</body>

</html>
